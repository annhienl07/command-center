<!DOCTYPE html>
<html>
<head>
    <title>Command Center Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background-color: #eef2f7;
            margin: 0;
        }

        nav {
            background-color: #1e3a5f;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        input {
            padding: 8px;
            margin-right: 10px;
        }

        button {
            padding: 8px 12px;
            background-color: #1e3a5f;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>

<body>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="about.html">Profile</a>
</nav>

<div class="container">

    <h1>Warehouse Command Center</h1>

    <h2>Add Inventory Item</h2>
    <input type="text" id="itemName" placeholder="Item Name">
    <input type="number" id="itemQty" placeholder="Quantity">
    <button onclick="addItem()">Add</button>

    <h2>Inventory List</h2>
    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="inventoryTable"></tbody>
    </table>

    <h2>Inventory Visualization</h2>
    <canvas id="inventoryChart"></canvas>

</div>

<script>
    let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
    let chart;

    function saveData() {
        localStorage.setItem("inventory", JSON.stringify(inventory));
    }

    function addItem() {
        let name = document.getElementById("itemName").value.trim();
        let qty = parseInt(document.getElementById("itemQty").value);

        if (!name || isNaN(qty) || qty < 0) {
            alert("Enter valid data");
            return;
        }

        if (inventory[name]) {
            inventory[name] += qty;
        } else {
            inventory[name] = qty;
        }

        saveData();
        renderTable();
        updateChart();

        document.getElementById("itemName").value = "";
        document.getElementById("itemQty").value = "";
    }

    function deleteItem(name) {
        delete inventory[name];
        saveData();
        renderTable();
        updateChart();
    }

    function renderTable() {
        let table = document.getElementById("inventoryTable");
        table.innerHTML = "";

        for (let item in inventory) {
            table.innerHTML += `
                <tr>
                    <td>${item}</td>
                    <td>${inventory[item]}</td>
                    <td><button onclick="deleteItem('${item}')">X</button></td>
                </tr>
            `;
        }
    }

    function updateChart() {
        const ctx = document.getElementById("inventoryChart");

        const labels = Object.keys(inventory);
        const data = Object.values(inventory);

        // LOW STOCK LOGIC (OPTION B)
        const colors = data.map(qty =>
            qty < 10 ? 'red' : '#1e3a5f'
        );

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Quantity',
                    data: data,
                    backgroundColor: colors
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                }
            }
        });
    }

    renderTable();
    updateChart();
</script>

</body>
</html>
